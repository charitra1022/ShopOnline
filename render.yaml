databases:
  - name: ShopOnline
    databaseName: ShopOnline
    user: ShopOnline

services:
  - type: web
    name: ShopOnline
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn ShopOnline.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ShopOnline
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4